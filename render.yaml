services:
  - type: web
    name: signal24-chat
    runtime: node
    plan: free
    buildCommand: npm install express socket.io
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: PORT
        value: 3001
